Match host betsy exec "! ip -j r | jq -e --arg dst '10.0.0.0/24' --arg scope 'link' 'any(.[]; .dst == $dst and .scope == $scope)' > /dev/null"
  Hostname 84.48.48.248

Match host betsy-bmc exec "! ip -j r | jq -e --arg dst '10.0.0.0/24' --arg scope 'link' 'any(.[]; .dst == $dst and .scope == $scope)' > /dev/null"
  Hostname 84.48.48.248
  Port 8022

Host betsy
  Hostname 10.0.0.10
Host betsy-bmc
  Hostname 10.0.0.9
  HostKeyAlgorithms=+ssh-rsa
  PubkeyAcceptedKeyTypes=+ssh-rsa
  KexAlgorithms diffie-hellman-group14-sha1,diffie-hellman-group1-sha1

Host betsy-bifrost
  ProxyJump betsy
  Hostname 192.168.3.2

Host lee
  ProxyJump betsy
  Hostname 192.168.3.6

Match host eden exec "! ip -j r | jq -e --arg dst '10.0.0.0/24' --arg scope 'link' 'any(.[]; .dst == $dst and .scope == $scope)' > /dev/null"
  ProxyJump betsy

Host eden
  Hostname 10.0.0.12
